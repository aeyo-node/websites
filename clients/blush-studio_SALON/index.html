                                    <li><a href="#bridal" className="hover:text-white transition">Elite Airbrush & HD Bridal Makeup</a></li>
                                    <li><a href="#services" className="hover:text-white transition">Nail Extensions & Pedicure Spa</a></li>
                                </ul>
                            </div>

                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-bold uppercase tracking-widest">Navigation</h4>
                                <ul className="space-y-2 text-xs font-light text-luxury-400">
                                    <li><a href="#home" className="hover:text-white transition">Home Lounge</a></li>
                                    <li><a href="#about" className="hover:text-white transition">About Our Philosophy</a></li>
                                    <li><a href="#services" className="hover:text-white transition">Explore Treatment Menu</a></li>
                                    <li><a href="#gallery" className="hover:text-white transition">Interactive Gallery</a></li>
                                    <li><a href="#contact" className="hover:text-white transition">Contact & Safe Parking Map</a></li>
                                </ul>
                            </div>

                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-bold uppercase tracking-widest">Safe Space Notice</h4>
                                <p className="text-xs text-luxury-400 font-light leading-relaxed">
                                    We utilize clinical standard sterilization. All products are genuinely sourced. Group consultations for weddings are recommended to be scheduled at least 2 weeks in advance.
                                </p>
                            </div>

                        </div>

                        <div className="max-w-[1320px] mx-auto px-6 mt-16 pt-8 border-t border-luxury-800/30 text-center md:flex md:justify-between md:text-left text-xs text-luxury-500 font-light">
                            <p>© {new Date().getFullYear()} Blush On - Salon & Spa. All Rights Reserved.</p>
                            <p className="mt-2 md:mt-0">Vellayambalam, Thiruvananthapuram, Kerala</p>
                        </div>
                    </footer>

                    {/* MODAL: PREMIUM BOOKING RESERVATION */}
                    {bookingOpen && (
                        <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4">
                            {/* Overlay */}
                            <div className="fixed inset-0 bg-luxury-dark/65 backdrop-blur-md transition-opacity" onClick={() => setBookingOpen(false)} />

                            {/* Modal Container */}
                            <div className="relative bg-[#FAF9F6] rounded-3xl overflow-hidden shadow-2xl border border-luxury-300/30 max-w-lg w-full z-10 animate-scale-in">
                                
                                {/* Header */}
                                <div className="bg-luxury-charcoal text-white p-6 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-serif tracking-wide">Secure Your Luxury Session</h3>
                                        <p className="text-[10px] text-luxury-300 font-light">Complimentary consultation included with every visit</p>
                                    </div>
                                    <button onClick={() => setBookingOpen(false)} className="text-luxury-400 hover:text-white p-1">
                                        <Icons.X />
                                    </button>
                                </div>

                                {/* Body */}
                                <div className="p-8">
                                    {bookingSuccess ? (
                                        <div className="text-center py-12 space-y-4 animate-scale-in">
                                            <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mx-auto">
                                                <Icons.Check />
                                            </div>
                                            <h4 className="text-xl font-serif text-luxury-charcoal">Appointment Request Sent</h4>
                                            <p className="text-sm text-luxury-500 font-light max-w-sm mx-auto">
                                                Thank you. Our luxury concierge desk will contact you shortly on your provided phone number to lock in your final time slot.
                                            </p>
                                        </div>
                                    ) : (
                                        <form onSubmit={submitBooking} className="space-y-4">
                                            
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Your Full Name</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    placeholder="Enter your name"
                                                    value={bookingData.name}
                                                    onChange={(e) => setBookingData({...bookingData, name: e.target.value})}
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Contact Number</label>
                                                <input 
                                                    type="tel" 
                                                    required
                                                    placeholder="Mobile phone"
                                                    value={bookingData.phone}
                                                    onChange={(e) => setBookingData({...bookingData, phone: e.target.value})}
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Treatment Wing</label>
                                                    <select 
                                                        value={bookingData.serviceCategory}
                                                        onChange={(e) => setBookingData({...bookingData, serviceCategory: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                    >
                                                        <option value="hair">Hair Styling & Spa</option>
                                                        <option value="skin">Skin Aesthetics</option>
                                                        <option value="bridal">Bridal & Makeover</option>
                                                        <option value="beauty">Pedicure & Beauty</option>
                                                    </select>
                                                </div>

                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Preferred Date</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={bookingData.date}
                                                        onChange={(e) => setBookingData({...bookingData, date: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                    />
                                                </div>
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Preferred Specific Service (Optional)</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="e.g. Signature Skin Glow, Bridal HD Makeup, Hair Spa"
                                                    value={bookingData.serviceName}
                                                    onChange={(e) => setBookingData({...bookingData, serviceName: e.target.value})}
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Special Notes or Requests (Optional)</label>
                                                <textarea 
                                                    rows="2"
                                                    placeholder="e.g. Specific requirements, skin sensitivity, or wedding timing."
                                                    value={bookingData.message}
                                                    onChange={(e) => setBookingData({...bookingData, message: e.target.value})}
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition resize-none"
                                                />
                                            </div>

                                            <button 
                                                type="submit"
                                                className="w-full bg-luxury-charcoal hover:bg-luxury-900 text-white font-bold text-xs tracking-widest py-4 rounded-xl transition"
                                            >
                                                SUBMIT RESERVATION REQUEST
                                            </button>

                                            <div className="text-center">
                                                <p className="text-[10px] text-luxury-500">
                                                    Need immediate service? <a href="tel:+917994912327" className="font-bold underline text-luxury-700">Call +91 79949 12327</a>
                                                </p>
                                            </div>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: LIGHTBOX GALLERY IMAGES */}
                    {lightboxOpen && (
                        <div className="fixed inset-0 z-50 bg-luxury-dark/95 backdrop-blur-lg flex items-center justify-center p-4">
                            <button 
                                onClick={() => setLightboxOpen(false)} 
                                className="absolute top-6 right-6 text-white/80 hover:text-white p-2 z-10 bg-white/10 rounded-full"
                            >
                                <Icons.X />
                            </button>

                            <div className="max-w-4xl w-full flex flex-col items-center gap-4 relative animate-scale-in">
                                <div className="relative rounded-2xl overflow-hidden border border-white/10 max-h-[70vh] aspect-[4/3] bg-black">
                                    <img 
                                        src={filteredGallery[lightboxIndex].image} 
                                        alt={filteredGallery[lightboxIndex].title} 
                                        className="w-full h-full object-contain"
                                    />
                                </div>
                                <div className="text-center text-white space-y-1 px-4">
                                    <h4 className="font-serif text-xl">{filteredGallery[lightboxIndex].title}</h4>
                                    <p className="text-xs text-luxury-300 font-light">{filteredGallery[lightboxIndex].caption}</p>
                                </div>

                                {/* Navigation Arrows */}
                                <div className="absolute left-2 right-2 top-1/2 -translate-y-1/2 flex justify-between pointer-events-none px-4">
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            setLightboxIndex(prev => (prev - 1 + filteredGallery.length) % filteredGallery.length);
                                        }}
                                        className="p-3 rounded-full bg-white/10 text-white hover:bg-white/20 pointer-events-auto transition"
                                    >
                                        <svg className="w-5 h-5 rotate-180" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                                    </button>
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            setLightboxIndex(prev => (prev + 1) % filteredGallery.length);
                                        }}
                                        className="p-3 rounded-full bg-white/10 text-white hover:bg-white/20 pointer-events-auto transition"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render standard react DOM 18 app setup
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
