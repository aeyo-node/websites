                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
                            
                            <div className="space-y-4">
                                <span className="font-serif-luxury text-2xl tracking-wider text-white">EDASSERY MANSION</span>
                                <p className="text-xs text-luxury-300 font-light leading-relaxed">
                                    Hotel Edassery Mansion Premium sets the standard for boutique hospitality on the Kaloor-Kadavanthra corridor. Designed to combine business facilities with exceptional traditional Kerala dining.
                                </p>
                            </div>

                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-bold uppercase tracking-widest">Our Service Suites</h4>
                                <ul className="space-y-2 text-xs font-light text-luxury-300">
                                    <li><a href="#rooms" className="hover:text-white transition">Premium Rooms</a></li>
                                    <li><a href="#rooms" className="hover:text-white transition">Executive Suites</a></li>
                                    <li><a href="#rooms" className="hover:text-white transition">Family Interconnecting Rooms</a></li>
                                    <li><a href="#rooms" className="hover:text-white transition">Deluxe Royal Accommodations</a></li>
                                </ul>
                            </div>

                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-bold uppercase tracking-widest">Quick Navigation</h4>
                                <ul className="space-y-2 text-xs font-light text-luxury-300">
                                    <li><a href="#home" className="hover:text-white transition">Home</a></li>
                                    <li><a href="#about" className="hover:text-white transition">Heritage & Philosophy</a></li>
                                    <li><a href="#dining" className="hover:text-white transition">Seafood Dining</a></li>
                                    <li><a href="#gallery" className="hover:text-white transition">Image Showcase</a></li>
                                </ul>
                            </div>

                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-bold uppercase tracking-widest">Kerala Heritage Care</h4>
                                <p className="text-xs text-luxury-300 font-light leading-relaxed">
                                    As part of standard safety guidelines, we maintain thorough room sanitization and safe car parking. Group wedding banquets must be booked in advance.
                                </p>
                            </div>

                        </div>

                        <div className="max-w-7xl mx-auto px-6 mt-16 pt-8 border-t border-white/5 text-center md:flex md:justify-between md:text-left text-xs text-luxury-400 font-light">
                            <p>© {new Date().getFullYear()} Hotel Edassery Mansion Premium. All Rights Reserved.</p>
                            <p className="mt-2 md:mt-0"> Kathrikadavu, Kaloor, Ernakulam, Kerala</p>
                        </div>
                    </footer>

                    {/* INTERACTIVE BOOKING ENGINE MODAL */}
                    {bookingOpen && (
                        <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4">
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-md transition-opacity" onClick={() => setBookingOpen(false)} />

                            <div className="relative bg-[#FCFBF9] rounded-3xl overflow-hidden shadow-2xl border border-luxury-300/40 max-w-lg w-full z-10">
                                
                                <div className="bg-luxury-dark text-white p-6 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xl font-serif-luxury tracking-wide">Secure Your Stay</h3>
                                        <p className="text-[10px] text-luxury-300 uppercase tracking-widest mt-1">Direct booking guarantees complimentary breakfast</p>
                                    </div>
                                    <button onClick={() => setBookingOpen(false)} className="text-luxury-400 hover:text-white p-2">
                                        <Icons.X />
                                    </button>
                                </div>

                                <div className="p-8">
                                    {bookingSuccess ? (
                                        <div className="text-center py-12 space-y-4">
                                            <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mx-auto text-2xl">
                                                ✓
                                            </div>
                                            <h4 className="text-xl font-serif-luxury text-luxury-dark">Reservation Request Received</h4>
                                            <p className="text-sm text-luxury-500 font-light max-w-sm mx-auto">
                                                Thank you. Our reservations desk will contact you shortly to confirm your dates and specific suite selections.
                                            </p>
                                        </div>
                                    ) : (
                                        <form onSubmit={submitBooking} className="space-y-4">
                                            
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Your Full Name</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={bookingForm.name}
                                                    onChange={e => setBookingForm({...bookingForm, name: e.target.value})}
                                                    placeholder="Enter your name"
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                />
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Contact Phone Number</label>
                                                <input 
                                                    type="tel" 
                                                    required
                                                    value={bookingForm.phone}
                                                    onChange={e => setBookingForm({...bookingForm, phone: e.target.value})}
                                                    placeholder="Phone Number"
                                                    className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-600 transition"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Check-In Date</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={bookingForm.checkIn}
                                                        onChange={e => setBookingForm({...bookingForm, checkIn: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-500 transition"
                                                    />
                                                </div>

                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Check-Out Date</label>
                                                    <input 
                                                        type="date" 
                                                        required
                                                        value={bookingForm.checkOut}
                                                        onChange={e => setBookingForm({...bookingForm, checkOut: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-500 transition"
                                                    />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Suite Type</label>
                                                    <select 
                                                        value={bookingForm.category}
                                                        onChange={e => setBookingForm({...bookingForm, category: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-500 transition"
                                                    >
                                                        <option value="Premium Suite">Premium Room</option>
                                                        <option value="Executive Room">Executive Room</option>
                                                        <option value="Family Room">Family Room</option>
                                                        <option value="Deluxe Accommodation">Deluxe Suite</option>
                                                    </select>
                                                </div>

                                                <div className="space-y-1">
                                                    <label className="text-[10px] uppercase tracking-wider font-bold text-luxury-500">Guests</label>
                                                    <select 
                                                        value={bookingForm.guests}
                                                        onChange={e => setBookingForm({...bookingForm, guests: e.target.value})}
                                                        className="w-full bg-white border border-luxury-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-luxury-500 transition"
                                                    >
                                                        <option value="1">1 Guest</option>
                                                        <option value="2">2 Guests</option>
                                                        <option value="3">3 Guests</option>
                                                        <option value="4+">Family Suite (4+)</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <button 
                                                type="submit"
                                                className="w-full bg-luxury-dark hover:bg-luxury-700 text-white font-bold text-xs tracking-widest py-4.5 rounded-xl transition"
                                            >
                                                CONFIRM RESERVATION REQUEST
                                            </button>

                                            <div className="text-center pt-2">
                                                <p className="text-[10px] text-luxury-500">
                                                    Prefer phone support? <a href="tel:+914842401122" className="font-bold underline text-luxury-700">Call +91 484 240 1122</a>
                                                </p>
                                            </div>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PORTFOLIO LIGHTBOX PREVIEW */}
                    {lightboxOpen && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-md flex items-center justify-center p-4">
                            <button 
                                onClick={() => setLightboxOpen(false)}
                                className="absolute top-6 right-6 text-white hover:text-luxury-200 p-2 bg-white/5 rounded-full"
                            >
                                <Icons.X />
                            </button>
                            <div className="max-w-4xl w-full">
                                <img src={lightboxImg} alt="Hotel Suite Showcase Close-up" className="w-full max-h-[80vh] object-contain rounded-2xl border border-white/10" />
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
